<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Glaucoma AI System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🧠 Glaucoma AI</span>

    {% if user.is_authenticated %}
        <div>
            <span class="text-white me-3">
                Welcome, {{ user.username }}
            </span>

            {% if user.is_staff %}
                <a href="{% url 'admin_dashboard' %}" class="btn btn-warning btn-sm">
                    Admin
                </a>
            {% else %}
                <!-- ✅ FIXED LINK -->
                <a href="{% url 'user_dashboard' %}" class="btn btn-info btn-sm">
                    Dashboard
                </a>
            {% endif %}

            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm ms-2">
                Logout
            </a>
        </div>
    {% endif %}
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
